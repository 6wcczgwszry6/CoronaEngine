<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Vite + Vue</title>
    <style>
        #__cam_toggle_dot {
            position: fixed; top: 12px; right: 12px; z-index: 100000;
            width: 24px; height: 24px; border-radius: 50%;
            background: #ec4899; cursor: grab; opacity: 0.85;
            border: 2px solid #fff;
            animation: __camPulse 1.5s ease-in-out infinite;
            font-size: 14px; line-height: 24px; text-align: center;
            color: #fff; user-select: none;
        }
        #__cam_toggle_dot:active { cursor: grabbing; }
        @keyframes __camPulse {
            0%, 100% { box-shadow: 0 0 6px #ec4899; }
            50% { box-shadow: 0 0 18px #ec4899, 0 0 28px #ec4899; }
        }
        #__camlock_ctrl {
            display: none; position: fixed; top: 42px; right: 12px; z-index: 99999;
            background: #2d2d2d; border: 2px solid #ec4899; border-radius: 8px;
            padding: 12px; color: #e0e0e0; font-size: 12px; min-width: 220px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.6);
        }
    </style>
</head>
<body>
<div id="app"></div>
<script type="module" src="./src/main.js"></script>
<script>
(function() {
    if (window.__camPanelLoaded) return;

    function isMainPage() {
        var hash = window.location.hash || '';
        return hash === '#/' || hash.indexOf('#/MainPage') === 0;
    }

    function tryInit() {
        if (window.__camPanelLoaded) return;
        if (!isMainPage()) return;
        if (!document.body) { setTimeout(tryInit, 30); return; }
        window.__camPanelLoaded = true;
        init();
    }

    // 双保险: hashchange 事件 + 延迟检测(Vue Router 初始化需要时间)
    window.addEventListener('hashchange', tryInit);
    setTimeout(tryInit, 150);
    setTimeout(tryInit, 500);

    function init() {
        if (!document.body) { setTimeout(init, 30); return; }

        var dot = document.createElement('div');
        dot.id = '__cam_toggle_dot';
        dot.title = '相机跟随 - 按住拖拽，点击展开';
        dot.textContent = '●';
        document.body.appendChild(dot);

        var panel = document.createElement('div');
        panel.id = '__camlock_ctrl';
        panel.innerHTML =
            '<div style="font-weight:bold;margin-bottom:8px;color:#ec4899;">相机跟随</div>' +
            '<label style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">' +
            '<span>启用</span><input id="__camlock_checkbox" type="checkbox" style="accent-color:#ec4899;"></label>' +
            '<div style="margin-top:4px;font-size:10px;color:#909090;">偏移 ' +
            'X<input id="__camlock_ox" type="number" value="0" step="0.1" style="width:50px;background:#1a1a1a;color:#e0e0e0;border:1px solid #3c3c3c;border-radius:3px;margin:0 2px;padding:1px 3px;">' +
            'Y<input id="__camlock_oy" type="number" value="0" step="0.1" style="width:50px;background:#1a1a1a;color:#e0e0e0;border:1px solid #3c3c3c;border-radius:3px;margin:0 2px;padding:1px 3px;">' +
            'Z<input id="__camlock_oz" type="number" value="2" step="0.1" style="width:50px;background:#1a1a1a;color:#e0e0e0;border:1px solid #3c3c3c;border-radius:3px;margin:0 2px;padding:1px 3px;">' +
            '</div>' +
            '<button id="__camlock_apply" style="margin-top:8px;width:100%;padding:4px;background:#ec4899;color:white;border:none;border-radius:4px;cursor:pointer;font-size:11px;">应用</button>' +
            '<div id="__camlock_status" style="margin-top:6px;font-size:10px;color:#f0a020;min-height:14px;"></div>';
        document.body.appendChild(panel);

        // ---- 拖拽 ----
        var dragging = false, startX, startY, startLeft, startTop, wasDragged = false;
        dot.addEventListener('mousedown', function(e) {
            if (e.button !== 0) return;
            wasDragged = false;
            dragging = true;
            startX = e.clientX; startY = e.clientY;
            var r = dot.getBoundingClientRect();
            startLeft = r.left; startTop = r.top;
            dot.style.right = 'auto';
            dot.style.left = startLeft + 'px';
            dot.style.top = startTop + 'px';
            dot.style.animation = 'none';
            e.preventDefault();
        });
        window.addEventListener('mousemove', function(e) {
            if (!dragging) return;
            if (Math.abs(e.clientX - startX) > 2 || Math.abs(e.clientY - startY) > 2) wasDragged = true;
            dot.style.left = (startLeft + e.clientX - startX) + 'px';
            dot.style.top = (startTop + e.clientY - startY) + 'px';
        });
        window.addEventListener('mouseup', function() {
            if (!dragging) return;
            dragging = false;
            dot.style.cursor = 'grab';
            dot.style.animation = '__camPulse 1.5s ease-in-out infinite';
            var r = dot.getBoundingClientRect();
            panel.style.right = 'auto';
            panel.style.left = Math.max(0, r.left - 220 + 24) + 'px';
            panel.style.top = (r.bottom + 6) + 'px';
        });

        // ---- 点击展开/收起 ----
        dot.addEventListener('mouseup', function() {
            if (!wasDragged) {
                var cur = panel.style.display;
                if (cur === 'none' || cur === '') {
                    var r = dot.getBoundingClientRect();
                    panel.style.right = 'auto';
                    panel.style.left = Math.max(0, r.left - 220 + 24) + 'px';
                    panel.style.top = (r.bottom + 6) + 'px';
                    panel.style.display = 'block';
                } else {
                    panel.style.display = 'none';
                }
            }
        });

        var following = false;
        function isGamePreviewInputLocked() {
            return !!window.__coronaGamePreviewInputLocked;
        }

        function readOffsets() {
            return [
                parseFloat(document.getElementById('__camlock_ox').value) || 0,
                parseFloat(document.getElementById('__camlock_oy').value) || 0,
                parseFloat(document.getElementById('__camlock_oz').value) || 2
            ];
        }

        function setFollowingUI(active) {
            var statusEl = document.getElementById('__camlock_status');
            if (active) {
                dot.style.background = '#4caf50';
                statusEl.style.color = '#4caf50';
                statusEl.textContent = '跟随中';
            } else {
                dot.style.background = '#ec4899';
                statusEl.style.color = '';
                statusEl.textContent = '已关闭';
            }
        }

        function applyLock() {
            var enabled = document.getElementById('__camlock_checkbox').checked;
            var off = readOffsets();
            var statusEl = document.getElementById('__camlock_status');
            statusEl.style.color = '#f0a020';
            statusEl.textContent = enabled ? '正在设置...' : '';
            window.cefQuery({
                request: JSON.stringify({ module: 'CoronaEditor', function: 'camera_lock_set', args: [enabled, off[0], off[1], off[2], 0, 0, 0] }),
                persistent: false,
                onSuccess: function(r) {
                    try {
                        var resp = JSON.parse(r);
                        if (resp.success) {
                            var data = resp.data;
                            if (data && data.ok) {
                                following = enabled;
                                if (enabled && data.offset) {
                                    document.getElementById('__camlock_ox').value = data.offset[0].toFixed(1);
                                    document.getElementById('__camlock_oy').value = data.offset[1].toFixed(1);
                                    document.getElementById('__camlock_oz').value = data.offset[2].toFixed(1);
                                }
                                setFollowingUI(enabled);
                            } else {
                                document.getElementById('__camlock_checkbox').checked = false;
                                following = false;
                                setFollowingUI(false);
                                statusEl.style.color = '#f44336';
                                statusEl.textContent = (data && data.error) || '失败';
                            }
                        }
                    } catch(e) {
                        statusEl.textContent = '';
                    }
                },
                onFailure: function(e) {
                    document.getElementById('__camlock_checkbox').checked = false;
                    following = false;
                    setFollowingUI(false);
                    statusEl.style.color = '#f44336';
                    statusEl.textContent = '通信失败';
                }
            });
        }

        function updateOffset() {
            if (!following) return;
            var off = readOffsets();
            var statusEl = document.getElementById('__camlock_status');
            statusEl.style.color = '#f0a020';
            statusEl.textContent = '更新偏移...';
            window.cefQuery({
                request: JSON.stringify({ module: 'CoronaEditor', function: 'camera_lock_set', args: [true, off[0], off[1], off[2], 0, 0, 0] }),
                persistent: false,
                onSuccess: function(r) {
                    statusEl.style.color = '#4caf50';
                    statusEl.textContent = '跟随中';
                },
                onFailure: function(e) {
                    statusEl.style.color = '#f44336';
                    statusEl.textContent = '更新失败';
                }
            });
        }

        // 键盘控制：ESC退出 / WASD移动物体（捕获阶段，先于Vue处理器）
        var wasdKeys = { w:1, a:1, s:1, d:1 };
        document.addEventListener('keydown', function(e) {
            if (isGamePreviewInputLocked()) return;
            var k = e.key.toLowerCase();
            if (k === 'escape' && following) {
                e.preventDefault();
                e.stopImmediatePropagation();
                document.getElementById('__camlock_checkbox').checked = false;
                applyLock();
                return;
            }
            if (wasdKeys[k] && following) {
                e.preventDefault();
                e.stopImmediatePropagation();
                window.cefQuery({
                    request: JSON.stringify({ module: 'CoronaEditor', function: 'object_key_down', args: [k] }),
                    persistent: false,
                    onSuccess: function() {},
                    onFailure: function() {}
                });
            }
        }, true);
        document.addEventListener('keyup', function(e) {
            if (isGamePreviewInputLocked()) return;
            var k = e.key.toLowerCase();
            if (wasdKeys[k] && following) {
                e.preventDefault();
                e.stopImmediatePropagation();
                window.cefQuery({
                    request: JSON.stringify({ module: 'CoronaEditor', function: 'object_key_up', args: [k] }),
                    persistent: false,
                    onSuccess: function() {},
                    onFailure: function() {}
                });
            }
        }, true);

        document.getElementById('__camlock_checkbox').onchange = applyLock;
        document.getElementById('__camlock_apply').onclick = updateOffset;

        window.__camPanelLoaded = true;  // 阻止 Python 端重复注入面板
    }
})();
</script>
</body>
</html>
